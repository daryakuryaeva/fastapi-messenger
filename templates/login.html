<html lang="ru">

<head>
    <meta charset="UTF-8">

    <title>Вход</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    >

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="auth-page">

    <div class="auth-card shadow">

        <h2 class="mb-4 text-center">
            Messenger
        </h2>

        <form method="post" action="/login">

            <div class="mb-3">

                <label class="form-label">
                    Логин
                </label>

                <input
                type="text"
                name="username"
                class="form-control"
                required
                >

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Пароль
                </label>

                <input
                type="password"
                name="password"
                class="form-control"
                required
                >

            </div>

            <button
            type="submit"
            class="btn btn-primary w-100"
            >
                Войти
            </button>

        </form>

        <div class="text-center mt-3">

            <a href="/register">
                Создать аккаунт
            </a>

        </div>

    </div>

</div>

</body>
</html>
